<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 실시간 매매 신호 위젯 (Trading Signals)</title>
    <!-- 구글 폰트 & 아이콘 연동 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #0b0e11 !important;
            padding: 16px;
            margin: 0;
            overflow-x: hidden;
            height: 100vh;
            box-sizing: border-box;
        }
        .widget-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 12px;
            margin-bottom: 12px;
        }
        .widget-title {
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 800;
            color: var(--color-yellow);
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 8px rgba(240, 185, 11, 0.2);
        }
        .btn-bring-back {
            background: transparent;
            border: 1px solid var(--color-yellow);
            color: var(--color-yellow);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-bring-back:hover {
            background: var(--color-yellow);
            color: #000;
        }
        .signal-widget-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }
        /* 스크롤바 커스텀 */
        .signal-widget-list::-webkit-scrollbar {
            width: 5px;
        }
        .signal-widget-list::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        .signal-widget-list::-webkit-scrollbar-thumb {
            background: rgba(240,185,11,0.2);
            border-radius: 3px;
        }
        .signal-widget-list::-webkit-scrollbar-thumb:hover {
            background: var(--color-yellow);
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="widget-header">
            <div class="widget-title">
                <i class="fa-solid fa-circle-exclamation text-yellow animate-pulse"></i>
                실시간 매매 신호 위젯
            </div>
            <button class="btn-bring-back" onclick="위젯회수()">화면 복귀</button>
        </div>
        <div id="signal-feed-list-widget" class="signal-feed-list" style="max-height: none; height: calc(100vh - 65px);">
            <!-- 실시간 신호 목록이 부모 창 데이터에 의해 업데이트됩니다 -->
        </div>
    </div>

    <script>
        // 팝업 위젯 닫힐 때 부모 창에 상태 알려 복원 처리
        window.onbeforeunload = function() {
            if (window.opener && !window.opener.closed) {
                window.opener.위젯회수액션('signal');
            }
        };

        function 위젯회수() {
            window.close();
        }

        // 부모 창에서 실시간으로 이 함수를 호출하여 렌더링합니다
        window.렌더링 = function() {
            if (!window.opener || window.opener.closed) return;
            
            const mainFeed = window.opener.document.getElementById("signal-feed-list");
            const widgetFeed = document.getElementById("signal-feed-list-widget");
            
            if (mainFeed && widgetFeed) {
                // 부모 창의 HTML 컨텐츠를 실시간 동기화 복사
                widgetFeed.innerHTML = mainFeed.innerHTML;
                
                // 새로 복사된 요소들에 대해서도 클릭 이벤트가 정상 작동하도록 바인딩을 주입합니다.
                // 팝업 내부의 신호 카드를 눌렀을 때 부모 창의 핫스왑 전환 함수가 트리거되도록 합니다.
                const items = widgetFeed.querySelectorAll('.signal-item');
                items.forEach(item => {
                    item.style.cursor = 'pointer';
                    item.onclick = function(e) {
                        const symbol = item.getAttribute('data-symbol') || (item.innerText.match(/[A-Z]{3,8}USDT/)?.[0]);
                        if (symbol && window.opener.window.코인탭전환) {
                            window.opener.window.코인탭전환(symbol);
                            // 부모 창 포커스 주기
                            window.opener.focus();
                        }
                    };
                });
            }
        };

        // 로드 즉시 최초 1회 렌더링
        window.onload = function() {
            window.렌더링();
        };
    </script>
</body>
</html>
